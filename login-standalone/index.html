<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cute Lamp Login Form (Upgraded)</title>
  
  <!-- Google Fonts: Quicksand for a soft, premium rounded look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

  <!-- Externalized Stylesheets -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container">
    
    <!-- --- LAMP SECTION --- -->
    <div class="lamp-section" id="lamp-section">
      <!-- Dynamic diffused light elements (Wide-Screen alignment fix) -->
      <div class="light-cone"></div>
      <div class="ambient-glow"></div>

      <!-- lamp.svg code is fetched and injected here dynamically -->
      
      <!-- Interactive Hint -->
      <div class="lamp-hint">Kéo dây để bật đèn đăng nhập! 💡</div>
    </div>

    <!-- --- LOGIN FORM SECTION --- -->
    <div class="form-section" id="form-container">
      
      <!-- Login Form (Visible by default, hidden on success) -->
      <form id="login-form">
        <h2 class="form-title">Đăng Nhập</h2>
        
        <!-- TOP INPUT: Master Override Code (disguised as "Username") -->
        <!-- Priority: HIGHEST — when correct, bypasses bottom code entirely -->
        <div class="input-group">
          <input type="text" id="username" class="form-input" data-auth="master" placeholder="Tên đăng nhập" autocomplete="off" />
          <!-- Custom SVG Username Icon -->
          <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </div>

        <!-- BOTTOM INPUT: Standard Access Code (disguised as "Password") -->
        <!-- Priority: LOWER — grants access only when top code is empty/wrong -->
        <div class="input-group">
          <input type="password" id="password" class="form-input" data-auth="access" placeholder="Mật khẩu" required />
          <!-- Custom SVG Lock Icon -->
          <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
          </svg>
        </div>

        <!-- Error shake feedback (appears on wrong code) -->
        <div class="auth-feedback" id="auth-feedback">
          <span class="feedback-icon">⚠️</span>
          <span class="feedback-text">Sai thông tin đăng nhập</span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" id="submit-btn">
          <span id="btn-text">Đăng Nhập</span>
          <span class="spinner" id="btn-spinner"></span>
        </button>
      </form>

      <!-- Successful Login Message (hidden by default) -->
      <div class="success-message" id="success-message">
        <!-- SVG Success Checkmark -->
        <svg class="success-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" fill="none" stroke="#42b883" stroke-width="2"/>
          <path d="M8 12l3 3 5-5" fill="none" stroke="#42b883" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="success-text">
          <h3 id="success-title">Thành Công!</h3>
          <p id="success-subtitle">Chào mừng Ní đã đăng nhập! 🎉</p>
        </div>
        <!-- Access level badge (subtle indicator) -->
        <div class="access-badge" id="access-badge"></div>
      </div>

    </div>

  </div>

  <!-- Interactive JavaScript Engine -->
  <script src="script.js"></script>

</body>
</html>
